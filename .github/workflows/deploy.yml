name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
      DEPLOY_USER: ${{ vars.EC2_USER != '' && vars.EC2_USER || secrets.EC2_USER }}
      DEPLOY_PORT: ${{ vars.EC2_PORT != '' && vars.EC2_PORT || secrets.EC2_PORT || '22' }}
    steps:
      - name: Validate deploy inputs
        run: |
          [ -n "${{ env.DEPLOY_HOST }}" ] || (echo "DEPLOY_HOST missing. Set repo Variable EC2_HOST or Secret EC2_HOST." && exit 1)
          [ -n "${{ env.DEPLOY_USER }}" ] || (echo "DEPLOY_USER missing. Set repo Variable EC2_USER or Secret EC2_USER." && exit 1)
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || (echo "EC2_SSH_KEY missing. Set repo Secret EC2_SSH_KEY." && exit 1)

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          script: |
            set -e
            APP_DIR="$HOME/linkvault"
            REPO_URL="https://github.com/mashinsp/LinkVault.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main

            docker compose pull || true
            docker compose up -d --build

            curl -fsS http://localhost:8000/health

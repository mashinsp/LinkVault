name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    environment: linkvault
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
      DEPLOY_USER: ${{ vars.EC2_USER != '' && vars.EC2_USER || secrets.EC2_USER }}
      DEPLOY_PORT: ${{ vars.EC2_PORT != '' && vars.EC2_PORT || secrets.EC2_PORT || '22' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          command_timeout: 30m
          script: |
            set -e
            APP_DIR="$HOME/linkvault"
            REPO_URL="https://github.com/mashinsp/LinkVault.git"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              for i in 1 2 3; do
                git clone --depth 1 "$REPO_URL" "$APP_DIR" && break
                echo "git clone failed (attempt $i). Retrying..."
                rm -rf "$APP_DIR"
                sleep 4
              done
            fi

            cd "$APP_DIR"
            git checkout main || git checkout -b main
            for i in 1 2 3; do
              git fetch --depth 1 origin main && break
              echo "git fetch failed (attempt $i). Retrying..."
              sleep 4
            done
            git reset --hard FETCH_HEAD

            bash deploy/ec2/deploy.sh
